<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sparkie — Steampunk Observatory</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #050208; font-family: 'Georgia', serif; }
    canvas { display: block; }
    #hint { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); color: rgba(200,150,100,0.4); font-size: 12px; letter-spacing: 0.08em; pointer-events: none; opacity: 1; transition: opacity 2s ease; }
    #title { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); color: rgba(180,130,80,0.4); font-size: 10px; letter-spacing: 0.3em; text-transform: uppercase; }
  </style>
</head>
<body>
<div id="title">🔭 STEAMPUNK OBSERVATORY ⚙️</div>
<div id="hint">drag to orbit</div>
<script type="importmap">{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js","three/addons/":"https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"}}</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.0;
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x050208);

const camera = new THREE.PerspectiveCamera(60, innerWidth / innerHeight, 0.1, 500);
camera.position.set(0, 15, 40);

const controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.autoRotate = true;
controls.autoRotateSpeed = 0.08;
controls.maxPolarAngle = Math.PI * 0.55;
controls.minDistance = 8;
controls.maxDistance = 70;

scene.add(new THREE.AmbientLight(0x100808, 0.3));

const bronzeMat = new THREE.MeshStandardMaterial({ color: 0x8B4513, metalness: 0.8, roughness: 0.3 });
const copperMat = new THREE.MeshStandardMaterial({ color: 0xB87333, metalness: 0.9, roughness: 0.2 });
const darkMat = new THREE.MeshStandardMaterial({ color: 0x1a1a20, roughness: 0.8 });
const glassMat = new THREE.MeshStandardMaterial({ color: 0x4488aa, transparent: true, opacity: 0.3, metalness: 0.1 });

// Stone base platform
const platform = new THREE.Mesh(
  new THREE.CylinderGeometry(20, 22, 3, 8),
  new THREE.MeshStandardMaterial({ color: 0x3a3530, roughness: 0.9 })
);
platform.position.y = 1.5;
scene.add(platform);

// Main dome
const dome = new THREE.Mesh(
  new THREE.SphereGeometry(15, 24, 24, 0, Math.PI * 2, 0, Math.PI / 2),
  bronzeMat
);
dome.position.y = 3;
scene.add(dome);

// Dome ribs
for (let r = 0; r < 12; r++) {
  const angle = (r / 12) * Math.PI * 2;
  const rib = new THREE.Mesh(
    new THREE.TorusGeometry(15, 0.3, 8, 24, Math.PI / 2),
    bronzeMat
  );
  rib.position.y = 3;
  rib.rotation.x = Math.PI / 2;
  rib.rotation.z = angle;
  scene.add(rib);
}

// Rotating observation ring
const ringGroup = new THREE.Group();
const outerRing = new THREE.Mesh(
  new THREE.TorusGeometry(12, 1, 12, 32),
  copperMat
);
ringGroup.add(outerRing);

// Decorative gears on ring
for (let g = 0; g < 8; g++) {
  const gear = new THREE.Mesh(
    new THREE.CylinderGeometry(2, 2, 0.5, 16),
    bronzeMat
  );
  gear.rotation.x = Math.PI / 2;
  const angle = (g / 8) * Math.PI * 2;
  gear.position.set(Math.cos(angle) * 12, 0, Math.sin(angle) * 12);
  ringGroup.add(gear);
  
  // Gear teeth
  for (let t = 0; t < 12; t++) {
    const tooth = new THREE.Mesh(
      new THREE.BoxGeometry(0.3, 0.4, 0.3),
      bronzeMat
    );
    const tAngle = (t / 12) * Math.PI * 2;
    tooth.position.set(
      Math.cos(angle) * 12 + Math.cos(tAngle) * 2.2,
      0,
      Math.sin(angle) * 12 + Math.sin(tAngle) * 2.2
    );
    tooth.rotation.y = -tAngle;
    ringGroup.add(tooth);
  }
}

ringGroup.position.y = 18;
scene.add(ringGroup);

// Telescope tube
const tubeGroup = new THREE.Group();
const tube = new THREE.Mesh(
  new THREE.CylinderGeometry(2, 3, 20, 16),
  copperMat
);
tube.rotation.z = Math.PI / 4;
tubeGroup.add(tube);

// Lens housing
const lensHousing = new THREE.Mesh(
  new THREE.CylinderGeometry(3, 2, 2, 16),
  bronzeMat
);
lensHousing.rotation.z = Math.PI / 4;
lensHousing.position.set(8, 0, 0);
tubeGroup.add(lensHousing);

// Glass lens
const lens = new THREE.Mesh(
  new THREE.CircleGeometry(2.5, 24),
  glassMat
);
lens.position.set(9, 0, 0);
lens.rotation.y = Math.PI / 4;
tubeGroup.add(lens);

// Eyepiece
const eyepiece = new THREE.Mesh(
  new THREE.CylinderGeometry(0.8, 1, 1.5, 12),
  bronzeMat
);
eyepiece.rotation.z = Math.PI / 4;
eyepiece.position.set(-7, 0, 0);
tubeGroup.add(eyepiece);

// Brass rings on tube
for (let c = 0; c < 5; c++) {
  const ring = new THREE.Mesh(
    new THREE.TorusGeometry(2.5 - c * 0.1, 0.15, 8, 24),
    bronzeMat
  );
  ring.position.set(-8 + c * 4, 0, 0);
  ring.rotation.y = Math.PI / 4;
  tubeGroup.add(ring);
}

tubeGroup.position.set(0, 18, 0);
scene.add(tubeGroup);

// Support struts
for (let s = 0; s < 6; s++) {
  const angle = (s / 6) * Math.PI * 2;
  const strut = new THREE.Mesh(
    new THREE.CylinderGeometry(0.2, 0.3, 15, 8),
    bronzeMat
  );
  strut.position.set(Math.cos(angle) * 8, 8, Math.sin(angle) * 8);
  strut.rotation.z = Math.PI / 6;
  strut.rotation.y = -angle;
  scene.add(strut);
}

// Clock face
const clockFace = new THREE.Mesh(
  new THREE.CylinderGeometry(3, 3, 0.3, 24),
  new THREE.MeshStandardMaterial({ color: 0xeeeecc })
);
clockFace.rotation.x = Math.PI / 2;
clockFace.position.set(0, 3, 16);
scene.add(clockFace);

// Clock hands
const hourHand = new THREE.Mesh(
  new THREE.BoxGeometry(0.15, 1.5, 0.1),
  bronzeMat
);
hourHand.position.set(0, 3, 16.2);
hourHand.rotation.z = -0.8;
scene.add(hourHand);

const minuteHand = new THREE.Mesh(
  new THREE.BoxGeometry(0.1, 2.2, 0.1),
  bronzeMat
);
minuteHand.position.set(0, 3, 16.2);
minuteHand.rotation.z = 0.5;
scene.add(minuteHand);

// Clock frame
const clockFrame = new THREE.Mesh(
  new THREE.TorusGeometry(3.2, 0.3, 8, 24),
  bronzeMat
);
clockFrame.position.set(0, 3, 16);
scene.add(clockFrame);

// Decorative pipes
for (let p = 0; p < 10; p++) {
  const pipe = new THREE.Mesh(
    new THREE.CylinderGeometry(0.15, 0.15, 8 + Math.random() * 8, 8),
    copperMat
  );
  const angle = Math.random() * Math.PI * 2;
  pipe.position.set(Math.cos(angle) * 15, 4 + Math.random() * 6, Math.sin(angle) * 15);
  pipe.rotation.z = (Math.random() - 0.5) * 0.3;
  scene.add(pipe);
}

// Steam vents
for (let v = 0; v < 6; v++) {
  const angle = (v / 6) * Math.PI * 2;
  const vent = new THREE.Mesh(
    new THREE.CylinderGeometry(0.5, 0.7, 1, 8),
    bronzeMat
  );
  vent.position.set(Math.cos(angle) * 18, 2.5, Math.sin(angle) * 18);
  scene.add(vent);
}

// Rivets
for (let r = 0; r < 60; r++) {
  const rivet = new THREE.Mesh(
    new THREE.SphereGeometry(0.08, 6, 6),
    bronzeMat
  );
  const angle = Math.random() * Math.PI * 2;
  const r2 = Math.random() * 15;
  rivet.position.set(Math.cos(angle) * r2, 3 + Math.random() * 12, Math.sin(angle) * r2);
  scene.add(rivet);
}

// Control levers
for (let l = 0; l < 4; l++) {
  const base = new THREE.Mesh(
    new THREE.BoxGeometry(0.5, 1, 0.5),
    darkMat
  );
  base.position.set(12 + l * 1.5, 2, 10);
  scene.add(base);
  
  const lever = new THREE.Mesh(
    new THREE.CylinderGeometry(0.08, 0.08, 2, 6),
    copperMat
  );
  lever.position.set(12 + l * 1.5, 3.5, 10);
  lever.rotation.z = 0.3 + l * 0.2;
  scene.add(lever);
}

// Stars
const starCount = 2000;
const starPos = new Float32Array(starCount * 3);
for (let i = 0; i < starCount; i++) {
  const theta = Math.random() * Math.PI * 2;
  const r = 200 + Math.random() * 100;
  starPos[i*3] = Math.cos(theta) * r;
  starPos[i*3+1] = 20 + Math.random() * 100;
  starPos[i*3+2] = Math.sin(theta) * r;
}
const starGeo = new THREE.BufferGeometry();
starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
scene.add(new THREE.Points(starGeo, new THREE.PointsMaterial({ color: 0xffffff, size: 0.5 })));

// Moon
const moon = new THREE.Mesh(
  new THREE.SphereGeometry(10, 24, 24),
  new THREE.MeshStandardMaterial({ color: 0xd0c8a0, emissive: 0x888860, emissiveIntensity: 0.2 })
);
moon.position.set(60, 80, -120);
scene.add(moon);

// Gear dust particles
const dustCount = 150;
const dustPos = new Float32Array(dustCount * 3);
for (let i = 0; i < dustCount; i++) {
  dustPos[i*3] = (Math.random() - 0.5) * 40;
  dustPos[i*3+1] = Math.random() * 25;
  dustPos[i*3+2] = (Math.random() - 0.5) * 40;
}
const dustGeo = new THREE.BufferGeometry();
dustGeo.setAttribute('position', new THREE.BufferAttribute(dustPos, 3));
const dustMat = new THREE.ShaderMaterial({
  uniforms: { uTime: { value: 0 } },
  vertexShader: `
    uniform float uTime;
    void main() {
      vec3 p = position;
      p.y += sin(uTime * 0.2 + position.x * 0.1) * 0.3;
      p.x += cos(uTime * 0.15 + position.z * 0.1) * 0.2;
      gl_PointSize = 5.0;
      gl_Position = projectionMatrix * modelViewMatrix * vec4(p, 1.0);
    }
  `,
  fragmentShader: `
    void main() {
      float d = length(gl_PointCoord - 0.5);
      if (d > 0.5) discard;
      float a = (1.0 - d * 2.0) * 0.4;
      vec3 col = vec3(0.8, 0.6, 0.3);
      gl_FragColor = vec4(col, a);
    }
  `,
  transparent: true, blending: THREE.AdditiveBlending, depthWrite: false
});
const dust = new THREE.Points(dustGeo, dustMat);
dust.userData.isDust = true;
scene.add(dust);

const clock = new THREE.Clock();
function animate() {
  requestAnimationFrame(animate);
  const t = clock.getElapsedTime();
  
  // Rotate telescope ring
  ringGroup.rotation.y += 0.002;
  
  // Gentle telescope sway
  tubeGroup.rotation.z = Math.PI / 4 + Math.sin(t * 0.3) * 0.02;
  
  if (dust.userData.isDust) dust.material.uniforms.uTime.value = t;
  
  controls.update();
  renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
setTimeout(() => { document.getElementById('hint').style.opacity = '0'; }, 5000);
</script>
</body>
</html>
